<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="智能报价对话与表单收集界面">
  <rect width="1200" height="680" fill="#f6f9fd"/>
  <rect x="86" y="70" width="1028" height="540" rx="18" fill="#ffffff" stroke="#d9e4f2"/>
  <rect x="126" y="114" width="356" height="452" rx="14" fill="#f7fbff" stroke="#dbe7f5"/>
  <text x="154" y="158" fill="#13233b" font-size="34" font-weight="900">AI 报价助手</text>
  <rect x="154" y="198" width="260" height="76" rx="14" fill="#eef5ff" stroke="#d5e5fa"/>
  <text x="178" y="228" fill="#536173" font-size="18" font-weight="700">请描述零件用途、材料、数量</text>
  <text x="178" y="254" fill="#536173" font-size="18" font-weight="700">和交期，我会整理报价输入。</text>
  <rect x="214" y="308" width="228" height="76" rx="14" fill="#004ac6"/>
  <text x="238" y="338" fill="#ffffff" font-size="18" font-weight="800">6061 铝合金外壳</text>
  <text x="238" y="364" fill="#ffffff" font-size="18" font-weight="800">50 件，黑色阳极氧化</text>
  <rect x="154" y="420" width="286" height="92" rx="14" fill="#eef5ff" stroke="#d5e5fa"/>
  <text x="178" y="452" fill="#13233b" font-size="18" font-weight="900">已识别关键字段</text>
  <text x="178" y="482" fill="#536173" font-size="17" font-weight="700">材料 / 数量 / 表面处理 / 交期</text>
  <rect x="536" y="114" width="520" height="116" rx="14" fill="#13233b"/>
  <text x="574" y="160" fill="#ffffff" font-size="28" font-weight="900">报价归纳</text>
  <text x="574" y="198" fill="#b7c7dd" font-size="19" font-weight="700">对话内容自动整理成工程师可复核的结构化需求</text>
  <rect x="536" y="258" width="240" height="116" rx="14" fill="#ffffff" stroke="#d9e4f2"/>
  <text x="568" y="300" fill="#004ac6" font-size="20" font-weight="900">价格区间</text>
  <text x="568" y="342" fill="#13233b" font-size="30" font-weight="900">AI 预估</text>
  <rect x="816" y="258" width="240" height="116" rx="14" fill="#ffffff" stroke="#d9e4f2"/>
  <text x="848" y="300" fill="#004ac6" font-size="20" font-weight="900">交期判断</text>
  <text x="848" y="342" fill="#13233b" font-size="30" font-weight="900">风险提示</text>
  <rect x="536" y="410" width="520" height="102" rx="14" fill="#f7fbff" stroke="#d9e4f2"/>
  <text x="574" y="452" fill="#13233b" font-size="24" font-weight="900">复杂需求转人工报价</text>
  <text x="574" y="488" fill="#536173" font-size="18" font-weight="700">图纸缺失、工艺不确定或大模型判断不足时，直接交给工程师复核。</text>
</svg>
